name: CI

on:
  push:
    paths:
      - "custom_components/**"
      - "tests/**"
  pull_request:
    paths:
      - "custom_components/**"
      - "tests/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest ruff
      - run: ruff check custom_components tests
      - run: pytest tests/ -q
